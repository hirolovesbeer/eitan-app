<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中学英語フラッシュカード</title>
<style>
:root {
  --c-bg: #0f0f1a;
  --c-card-front: linear-gradient(145deg, #1e1b4b, #312e81);
  --c-card-back:  linear-gradient(145deg, #0c2a4a, #1e3a5f);
  --c-accent: #818cf8;
  --c-ok: #4ade80;
  --c-ng: #f87171;
  --c-xp: #fbbf24;
  --c-streak: #fb923c;
  --radius: 20px;
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  background: var(--c-bg);
  color: #fff;
  overflow: hidden;
}

/* ─── HEADER ─────────────────────────── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 12px 16px 8px;
  background: rgba(15,15,26,0.95);
  backdrop-filter: blur(10px);
  z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.hd-streak { display:flex; align-items:center; gap:4px; font-size:.9rem; color:var(--c-streak); font-weight:700; }
.hd-xp-wrap { flex:1; }
.hd-xp-label { font-size:.65rem; color:#888; display:flex; justify-content:space-between; margin-bottom:3px; }
.hd-xp-bar-bg { background:rgba(255,255,255,.1); border-radius:10px; height:6px; overflow:hidden; }
.hd-xp-bar { height:100%; background:linear-gradient(90deg,#7c3aed,#f59e0b); border-radius:10px; transition:width .5s; }
.hd-level { font-size:.8rem; color:var(--c-xp); font-weight:700; white-space:nowrap; }
.hd-menu-btn { background:none; border:none; color:#aaa; font-size:1.4rem; cursor:pointer; padding:4px; }

/* ─── MAIN AREA ──────────────────────── */
#main {
  height: 100%;
  padding-top: 56px;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 8px;
}

/* ─── GRADE TABS ─────────────────────── */
#gradeTabs {
  display: flex; gap: 8px; padding: 10px 16px 6px; width: 100%;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.grade-tab {
  flex-shrink: 0;
  padding: 6px 18px; border-radius: 30px; font-size: .8rem;
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
  color: #aaa; cursor: pointer; transition: all .2s;
}
.grade-tab.active { background: #7c3aed; border-color: #a78bfa; color: #fff; font-weight: 700; }

/* ─── PROGRESS ───────────────────────── */
#progressWrap { width:100%; padding: 6px 20px 4px; }
.prog-row { display:flex; justify-content:space-between; font-size:.72rem; color:#888; margin-bottom:4px; }
.prog-bg { background:rgba(255,255,255,.08); border-radius:10px; height:5px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#a855f7); border-radius:10px; transition:width .4s; }

/* ─── CARD SCENE ─────────────────────── */
#cardScene {
  flex: 1;
  width: 100%; max-width: 420px;
  padding: 8px 16px;
  display: flex; flex-direction: column; justify-content: center;
  touch-action: pan-y;
  position: relative;
}
#cardWrap {
  perspective: 1200px;
  cursor: pointer;
  user-select: none;
}
#card {
  width: 100%; height: 230px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
}
#card.flipped { transform: rotateY(180deg); }
#card.swipe-ok  { animation: swipeRight .35s forwards; }
#card.swipe-ng  { animation: swipeLeft  .35s forwards; }
@keyframes swipeRight {
  to { transform: translateX(120%) rotate(20deg) rotateY(0deg); opacity:0; }
}
@keyframes swipeLeft {
  to { transform: translateX(-120%) rotate(-20deg) rotateY(0deg); opacity:0; }
}

.card-face {
  position: absolute; width:100%; height:100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 20px;
  text-align: center;
  box-shadow: var(--shadow);
}
.card-front { background: var(--c-card-front); border:1px solid rgba(129,140,248,.25); }
.card-back  { background: var(--c-card-back);  border:1px solid rgba(56,189,248,.2); transform: rotateY(180deg); }

.c-grade-badge {
  font-size: .65rem; letter-spacing:1.5px; text-transform:uppercase;
  padding: 3px 12px; border-radius:20px; margin-bottom: 12px;
  background: rgba(167,139,250,.15); color: #a78bfa;
}
.c-word { font-size: 2.4rem; font-weight:800; color:#f0edff; letter-spacing:.5px; }
.c-phonetic { font-size:.9rem; color:#a78bfa; margin-top:6px; }
.c-hint { font-size:.7rem; color:rgba(255,255,255,.25); margin-top:16px; }
.c-pos { font-size:.72rem; background:rgba(56,189,248,.15); color:#7dd3fc;
         border-radius:20px; padding:3px 12px; margin-bottom:10px; }
.c-meaning { font-size:1.55rem; font-weight:700; color:#e0f2fe; }
.c-example { font-size:.8rem; color:rgba(186,230,253,.65); font-style:italic;
             line-height:1.55; margin-top:12px; }
.c-example-ja { font-size:.72rem; color:rgba(186,230,253,.45); margin-top:4px; }

/* Swipe hint arrows */
#swipeHint {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 4px;
  pointer-events:none;
}
.swipe-hint-ng { color: rgba(248,113,113,.4); font-size:.75rem; display:flex; align-items:center; gap:4px; }
.swipe-hint-ok { color: rgba(74,222,128,.4); font-size:.75rem; display:flex; align-items:center; gap:4px; }

/* drag indicator */
#dragIndicator {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:3rem; font-weight:900; opacity:0; pointer-events:none; transition:opacity .1s;
  z-index:10;
}

/* ─── BOTTOM BUTTONS ─────────────────── */
#bottomRow {
  width: 100%; max-width: 420px;
  padding: 6px 16px 10px;
}
#flipRow, #judgeRow { display:flex; justify-content:center; gap:14px; }
.btn-flip {
  background: linear-gradient(135deg,#6d28d9,#a855f7);
  color:#fff; border:none; border-radius:50px;
  padding: 14px 48px; font-size:1rem; font-weight:700;
  cursor:pointer; box-shadow:0 8px 24px rgba(124,58,237,.4);
  transition:transform .15s, box-shadow .15s;
  width: 100%;
}
.btn-flip:active { transform:scale(.97); }
.btn-ok, .btn-ng {
  flex: 1; padding: 14px; border:none; border-radius:14px;
  font-size:.95rem; font-weight:700; cursor:pointer;
  transition:transform .15s, box-shadow .15s;
}
.btn-ok { background:linear-gradient(135deg,#166534,#4ade80); color:#fff;
          box-shadow:0 8px 20px rgba(74,222,128,.3); }
.btn-ng { background:linear-gradient(135deg,#991b1b,#f87171); color:#fff;
          box-shadow:0 8px 20px rgba(248,113,113,.3); }
.btn-ok:active, .btn-ng:active { transform:scale(.97); }

/* ─── PANEL (badges / result) ─────────── */
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px); z-index:200;
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
#overlay.show { display:flex; }
#panel {
  background: linear-gradient(145deg,#1e1b3b,#16213e);
  border:1px solid rgba(167,139,250,.2);
  border-radius:24px; padding:28px 24px;
  width:100%; max-width:380px;
  max-height:90vh; overflow-y:auto;
  text-align:center;
}
.panel-title { font-size:1.4rem; font-weight:800; margin-bottom:6px; }
.panel-sub   { font-size:.85rem; color:#888; margin-bottom:20px; }

/* Badge grid */
.badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.badge-item {
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  border-radius:14px; padding:14px 8px; display:flex; flex-direction:column;
  align-items:center; gap:6px;
}
.badge-item.earned { border-color:rgba(251,191,36,.4); background:rgba(251,191,36,.08); }
.badge-item.earned .badge-icon { opacity:1; }
.badge-item .badge-icon { font-size:2rem; opacity:.25; }
.badge-item .badge-name { font-size:.65rem; color:#aaa; line-height:1.3; text-align:center; }
.badge-item.earned .badge-name { color:#fbbf24; }

/* result */
.result-emoji { font-size:3.5rem; margin-bottom:12px; }
.result-score { font-size:2rem; font-weight:800; margin-bottom:4px; }
.result-detail { font-size:.85rem; color:#888; margin-bottom:20px; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.result-box { background:rgba(255,255,255,.06); border-radius:12px; padding:14px; }
.result-num { font-size:1.8rem; font-weight:800; }
.result-num.ok { color:var(--c-ok); }
.result-num.ng { color:var(--c-ng); }
.result-lbl { font-size:.7rem; color:#888; margin-top:2px; }

.btn-panel {
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:#fff; border:none; border-radius:50px;
  padding:14px 40px; font-size:1rem; font-weight:700;
  cursor:pointer; width:100%; margin-top:8px;
  transition:transform .15s;
}
.btn-panel:active { transform:scale(.97); }
.btn-panel-outline {
  background:transparent; border:1px solid rgba(255,255,255,.2);
  color:#ccc; border-radius:50px; padding:12px 30px;
  font-size:.9rem; cursor:pointer; width:100%;
  margin-top:8px; transition:background .2s;
}
.btn-panel-outline:hover { background:rgba(255,255,255,.07); }

/* ─── TOAST / NOTIFICATION ────────────── */
#toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:rgba(30,27,75,.95); border:1px solid rgba(167,139,250,.3);
  border-radius:50px; padding:10px 24px;
  font-size:.85rem; font-weight:600; color:#c4b5fd;
  pointer-events:none; opacity:0; transition:opacity .3s;
  z-index:300; white-space:nowrap;
}
#toast.show { opacity:1; }

/* ─── BADGE POPUP ────────────────────── */
#badgePopup {
  position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#78350f,#92400e);
  border:2px solid #fbbf24; border-radius:16px;
  padding:14px 24px; text-align:center;
  opacity:0; transition:all .4s; z-index:300;
  pointer-events:none; min-width:220px;
}
#badgePopup.show { opacity:1; transform:translateX(-50%) translateY(0); }
.bp-title { font-size:.65rem; color:#fbbf24; letter-spacing:2px; text-transform:uppercase; }
.bp-emoji { font-size:2rem; }
.bp-name  { font-size:.9rem; font-weight:700; color:#fef3c7; }

/* ─── LEVEL UP OVERLAY ───────────────── */
#levelUp {
  position:fixed; inset:0; display:none; align-items:center; justify-content:center;
  z-index:400; pointer-events:none;
}
#levelUp.show { display:flex; }
.lu-box {
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  border:2px solid #818cf8; border-radius:24px;
  padding:36px 40px; text-align:center;
  animation: levelBounce .6s ease;
}
@keyframes levelBounce {
  0%   { transform:scale(.5); opacity:0; }
  60%  { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
.lu-label { font-size:.75rem; color:#818cf8; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.lu-level { font-size:3.5rem; font-weight:900; color:#f0edff; }
.lu-sub   { font-size:.9rem; color:#a78bfa; margin-top:8px; }

/* ─── MENU PANEL ─────────────────────── */
#menuPanel {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px); z-index:200; display:none; align-items:flex-end;
}
#menuPanel.show { display:flex; }
.menu-inner {
  background:linear-gradient(145deg,#1e1b3b,#16213e);
  border:1px solid rgba(167,139,250,.2);
  border-radius:24px 24px 0 0; padding:20px 20px 32px;
  width:100%; max-width:420px; margin:0 auto;
}
.menu-title { font-size:1.1rem; font-weight:700; margin-bottom:16px; text-align:center; color:#c4b5fd; }
.menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.menu-card {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:14px; padding:16px 12px; text-align:center; cursor:pointer;
  transition:background .2s;
}
.menu-card:hover { background:rgba(255,255,255,.1); }
.menu-card .mc-icon { font-size:1.8rem; margin-bottom:6px; }
.menu-card .mc-label { font-size:.78rem; color:#aaa; }
.menu-close {
  width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:#ccc; border-radius:50px; padding:12px; font-size:.9rem; cursor:pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="hd-streak" id="streakDisplay">🔥0</div>
  <div class="hd-xp-wrap">
    <div class="hd-xp-label">
      <span id="xpLabel">Lv.1</span>
      <span id="xpNum">0 XP</span>
    </div>
    <div class="hd-xp-bar-bg"><div class="hd-xp-bar" id="xpBar" style="width:0%"></div></div>
  </div>
  <div class="hd-level" id="levelLabel">Lv.1</div>
  <button class="hd-menu-btn" onclick="openMenu()">☰</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- Grade tabs -->
  <div id="gradeTabs">
    <div class="grade-tab active" onclick="setGrade('all')" data-g="all">すべて</div>
    <div class="grade-tab" onclick="setGrade('1')" data-g="1">中1</div>
    <div class="grade-tab" onclick="setGrade('2')" data-g="2">中2</div>
    <div class="grade-tab" onclick="setGrade('3')" data-g="3">中3</div>
  </div>

  <!-- Progress -->
  <div id="progressWrap">
    <div class="prog-row">
      <span id="progText">1 / 60</span>
      <span id="progPct">0%</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <!-- Card scene -->
  <div id="cardScene">
    <div id="dragIndicator"></div>
    <div id="swipeHint">
      <div class="swipe-hint-ng">← 知らない</div>
      <div class="swipe-hint-ok">知ってた →</div>
    </div>
    <div id="cardWrap">
      <div id="card">
        <div class="card-face card-front">
          <div class="c-grade-badge" id="frontGrade">中1</div>
          <div class="c-word" id="frontWord">—</div>
          <div class="c-phonetic" id="frontPhonetic"></div>
          <div class="c-hint">タップ or スワイプ</div>
        </div>
        <div class="card-face card-back">
          <div class="c-pos" id="backPos"></div>
          <div class="c-meaning" id="backMeaning">—</div>
          <div class="c-example" id="backExample"></div>
          <div class="c-example-ja" id="backExampleJa"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div id="bottomRow">
    <div id="flipRow"><button class="btn-flip" onclick="flipCard()">🔄 意味を確認</button></div>
    <div id="judgeRow" style="display:none">
      <button class="btn-ng" onclick="judge(false)">✗ 知らない</button>
      <button class="btn-ok" onclick="judge(true)">✓ 知ってた！</button>
    </div>
  </div>
</div>

<!-- OVERLAY (badges / result) -->
<div id="overlay" onclick="closeOverlay()">
  <div id="panel" onclick="e=>e.stopPropagation()">
    <div id="panelContent"></div>
  </div>
</div>

<!-- MENU -->
<div id="menuPanel" onclick="closeMenu()">
  <div class="menu-inner" onclick="e=>e.stopPropagation()">
    <div class="menu-title">📚 メニュー</div>
    <div class="menu-grid">
      <div class="menu-card" onclick="openBadgePanel();closeMenu()">
        <div class="mc-icon">🏅</div>
        <div class="mc-label">実績バッジ</div>
      </div>
      <div class="menu-card" onclick="shuffleDeck();closeMenu()">
        <div class="mc-icon">🔀</div>
        <div class="mc-label">シャッフル</div>
      </div>
      <div class="menu-card" onclick="resetSession();closeMenu()">
        <div class="mc-icon">🔁</div>
        <div class="mc-label">最初から</div>
      </div>
      <div class="menu-card" onclick="resetAllData();closeMenu()">
        <div class="mc-icon">🗑️</div>
        <div class="mc-label">データリセット</div>
      </div>
    </div>
    <button class="menu-close" onclick="closeMenu()">閉じる</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- BADGE POPUP -->
<div id="badgePopup">
  <div class="bp-title">🏅 バッジ獲得！</div>
  <div class="bp-emoji" id="bpEmoji"></div>
  <div class="bp-name" id="bpName"></div>
</div>

<!-- LEVEL UP -->
<div id="levelUp">
  <div class="lu-box">
    <div class="lu-label">⭐ レベルアップ！</div>
    <div class="lu-level" id="luLevel"></div>
    <div class="lu-sub" id="luSub"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  WORD DATA — 中学英語 60語
// ═══════════════════════════════════════
const WORDS = [
  // ── 中1 (60語) ──────────────────────────
  // 動詞
  {g:"1",word:"want",ph:"/wɒnt/",pos:"動詞",ja:"欲しい・したい",ex:"I want to play soccer.",exJa:"私はサッカーをしたい。"},
  {g:"1",word:"like",ph:"/laɪk/",pos:"動詞",ja:"好きだ・好む",ex:"She likes reading books.",exJa:"彼女は読書が好きだ。"},
  {g:"1",word:"have",ph:"/hæv/",pos:"動詞",ja:"持っている",ex:"I have a dog.",exJa:"私は犬を飼っている。"},
  {g:"1",word:"know",ph:"/noʊ/",pos:"動詞",ja:"知っている",ex:"Do you know his name?",exJa:"彼の名前を知っていますか？"},
  {g:"1",word:"think",ph:"/θɪŋk/",pos:"動詞",ja:"思う・考える",ex:"I think it is a good idea.",exJa:"それは良い考えだと思う。"},
  {g:"1",word:"speak",ph:"/spiːk/",pos:"動詞",ja:"話す",ex:"Can you speak English?",exJa:"英語を話せますか？"},
  {g:"1",word:"study",ph:"/ˈstʌdi/",pos:"動詞",ja:"勉強する",ex:"I study Japanese every day.",exJa:"私は毎日日本語を勉強する。"},
  {g:"1",word:"listen",ph:"/ˈlɪsən/",pos:"動詞",ja:"聞く・耳を傾ける",ex:"Please listen to me carefully.",exJa:"よく聞いてください。"},
  {g:"1",word:"enjoy",ph:"/ɪnˈdʒɔɪ/",pos:"動詞",ja:"楽しむ",ex:"I enjoy playing tennis.",exJa:"私はテニスを楽しんでいる。"},
  {g:"1",word:"teach",ph:"/tiːtʃ/",pos:"動詞",ja:"教える",ex:"She teaches math at school.",exJa:"彼女は学校で数学を教えている。"},
  {g:"1",word:"understand",ph:"/ˌʌndəˈstænd/",pos:"動詞",ja:"理解する・わかる",ex:"I don't understand this problem.",exJa:"この問題がわからない。"},
  {g:"1",word:"help",ph:"/help/",pos:"動詞",ja:"助ける・手伝う",ex:"Can you help me with this?",exJa:"これを手伝ってもらえますか？"},
  {g:"1",word:"use",ph:"/juːz/",pos:"動詞",ja:"使う",ex:"I use a dictionary every day.",exJa:"私は毎日辞書を使う。"},
  {g:"1",word:"try",ph:"/traɪ/",pos:"動詞",ja:"試みる・やってみる",ex:"Try your best!",exJa:"全力を尽くして！"},
  {g:"1",word:"look",ph:"/lʊk/",pos:"動詞",ja:"見る・〜に見える",ex:"Look at the sky.",exJa:"空を見て。"},
  {g:"1",word:"show",ph:"/ʃoʊ/",pos:"動詞",ja:"見せる・示す",ex:"Show me your picture.",exJa:"あなたの写真を見せて。"},
  {g:"1",word:"call",ph:"/kɔːl/",pos:"動詞",ja:"呼ぶ・電話する",ex:"Please call me tonight.",exJa:"今夜電話してください。"},
  {g:"1",word:"ask",ph:"/æsk/",pos:"動詞",ja:"尋ねる・頼む",ex:"Ask your teacher if you don't understand.",exJa:"わからなければ先生に聞いて。"},
  {g:"1",word:"tell",ph:"/tel/",pos:"動詞",ja:"告げる・話す",ex:"Tell me about your hobby.",exJa:"趣味について話して。"},
  {g:"1",word:"learn",ph:"/lɜːrn/",pos:"動詞",ja:"学ぶ・習う",ex:"I want to learn French.",exJa:"フランス語を習いたい。"},
  {g:"1",word:"visit",ph:"/ˈvɪzɪt/",pos:"動詞",ja:"訪問する",ex:"I visited Kyoto last year.",exJa:"去年京都を訪問した。"},
  {g:"1",word:"remember",ph:"/rɪˈmembər/",pos:"動詞",ja:"覚えている・思い出す",ex:"Remember to bring your lunch.",exJa:"お弁当を持ってくるのを忘れずに。"},

  {g:"3",word:"valuable",ph:"/ˈvæljuəbəl/",pos:"形容詞",ja:"価値ある・貴重な",ex:"Your feedback is valuable.",exJa:"あなたのフィードバックは価値がある。"},
  {g:"3",word:"vulnerable",ph:"/ˈvʌlnərəbəl/",pos:"形容詞",ja:"脆弱な・傷つきやすい",ex:"Children are vulnerable.",exJa:"子どもは傷つきやすい。"},
  {g:"3",word:"flexible",ph:"/ˈfleksɪbəl/",pos:"形容詞",ja:"柔軟な・融通が利く",ex:"Be flexible in your approach.",exJa:"アプローチに柔軟性を持って。"},
];

// ═══════════════════════════════════════
//  BADGE DEFINITIONS
// ═══════════════════════════════════════
const BADGES = [
  {id:"first",    emoji:"🌱",name:"最初の一歩",     desc:"初めてカードを答えた",     check: s => s.totalAnswered >= 1},
  {id:"streak3",  emoji:"🔥",name:"3日連続",        desc:"3日間連続で学習した",      check: s => s.streak >= 3},
  {id:"streak7",  emoji:"💎",name:"1週間継続",      desc:"7日間連続で学習した",      check: s => s.streak >= 7},
  {id:"ok10",     emoji:"⭐",name:"10問正解",        desc:"10問正解した",             check: s => s.totalOk >= 10},
  {id:"ok30",     emoji:"🌟",name:"30問正解",        desc:"30問正解した",             check: s => s.totalOk >= 30},
  {g:"1",id:"grade1",  emoji:"📘",name:"中1マスター",    desc:"中1単語を全問クリア",      check: s => s.grade1Cleared},
  {g:"2",id:"grade2",  emoji:"📗",name:"中2マスター",    desc:"中2単語を全問クリア",      check: s => s.grade2Cleared},
  {g:"3",id:"grade3",  emoji:"📕",name:"中3マスター",    desc:"中3単語を全問クリア",      check: s => s.grade3Cleared},
  {id:"all",      emoji:"🏆",name:"全単語制覇",      desc:"全480語以上をクリアした",   check: s => s.allCleared},
  {id:"lv5",      emoji:"💫",name:"Lv.5到達",        desc:"レベル5に達した",          check: s => s.level >= 5},
  {id:"lv10",     emoji:"🎖️",name:"Lv.10到達",       desc:"レベル10に達した",         check: s => s.level >= 10},
  {id:"xp500",    emoji:"💰",name:"XP500達成",        desc:"累計500XP獲得",            check: s => s.totalXp >= 500},
];

// XP levels
const LEVEL_XP = [0,50,120,220,350,520,730,980,1280,1630,2030];
function xpToLevel(xp) {
  for (let i = LEVEL_XP.length-1; i >= 0; i--) if (xp >= LEVEL_XP[i]) return i+1;
  return 1;
}
function levelProgress(xp) {
  const lv = xpToLevel(xp);
  if (lv >= LEVEL_XP.length) return {pct:100, cur:0, next:0};
  const base = LEVEL_XP[lv-1], next = LEVEL_XP[lv];
  return { pct:Math.round((xp-base)/(next-base)*100), cur:xp-base, next:next-base };
}

// ═══════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════
let state;
function loadState() {
  try { state = JSON.parse(localStorage.getItem('chuugaku_state') || 'null'); } catch{}
  if (!state) state = defaultState();
}
function defaultState() {
  return {
    xp:0, level:1, streak:0, lastDate:'',
    totalOk:0, totalAnswered:0, totalXp:0,
    badges:[],
    grade1Cleared:false, grade2Cleared:false, grade3Cleared:false, allCleared:false,
  };
}
function saveState() { localStorage.setItem('chuugaku_state', JSON.stringify(state)); }

// ═══════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════
let deck = [];
let idx = 0;
let isFlipped = false;
let sessionResults = {};
let currentGrade = 'all';

function setGrade(g) {
  currentGrade = g;
  document.querySelectorAll('.grade-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.g === g);
  });
  buildDeck();
}
function buildDeck() {
  deck = currentGrade === 'all' ? [...WORDS] : WORDS.filter(w => w.g === currentGrade);
  shuffleArr(deck);
  idx = 0; sessionResults = {};
  renderCard();
  updateProgress();
}
function shuffleDeck() { shuffleArr(deck); idx = 0; sessionResults = {}; renderCard(); updateProgress(); }
function resetSession() { buildDeck(); }

function shuffleArr(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function renderCard() {
  if (idx >= deck.length) { showResultPanel(); return; }
  const w = deck[idx];
  document.getElementById('frontGrade').textContent = '中' + w.g;
  document.getElementById('frontWord').textContent = w.word;
  document.getElementById('frontPhonetic').textContent = w.ph;
  document.getElementById('backPos').textContent = w.pos;
  document.getElementById('backMeaning').textContent = w.ja;
  document.getElementById('backExample').textContent = '📝 ' + w.ex;
  document.getElementById('backExampleJa').textContent = w.exJa;
  isFlipped = false;
  const card = document.getElementById('card');
  card.className = '';
  document.getElementById('flipRow').style.display = 'flex';
  document.getElementById('judgeRow').style.display = 'none';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('flipRow').style.display = 'none';
    document.getElementById('judgeRow').style.display = 'flex';
  } else {
    document.getElementById('flipRow').style.display = 'flex';
    document.getElementById('judgeRow').style.display = 'none';
  }
}

function updateProgress() {
  const total = deck.length;
  const done = Object.keys(sessionResults).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progText').textContent = (idx+1) + ' / ' + total;
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

// ═══════════════════════════════════════
//  JUDGE
// ═══════════════════════════════════════
function judge(ok) {
  if (!isFlipped) return;
  const w = deck[idx];
  sessionResults[w.word] = ok;
  const xpGain = ok ? 15 : 5;

  // State update
  const prevLevel = state.level;
  state.xp += xpGain;
  state.totalXp += xpGain;
  state.totalAnswered++;
  if (ok) state.totalOk++;
  state.level = xpToLevel(state.xp);
  updateStreak();
  saveState();
  updateHeader();

  // Level up?
  if (state.level > prevLevel) showLevelUp(state.level);

  // Animate card out
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  card.classList.add(ok ? 'swipe-ok' : 'swipe-ng');
  showToast((ok ? '✓ +15 XP 🎉' : '✗ +5 XP') );

  setTimeout(() => {
    idx++;
    checkClearBadges();
    checkBadges();
    updateProgress();
    renderCard();
  }, 380);
}

// ═══════════════════════════════════════
//  STREAK
// ═══════════════════════════════════════
function updateStreak() {
  const today = new Date().toLocaleDateString('ja-JP');
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('ja-JP');
  if (state.lastDate === yesterday) {
    state.streak++;
  } else {
    state.streak = 1;
  }
  state.lastDate = today;
}

// ═══════════════════════════════════════
//  HEADER
// ═══════════════════════════════════════
function updateHeader() {
  const lv = state.level;
  const prog = levelProgress(state.xp);
  document.getElementById('streakDisplay').textContent = '🔥' + state.streak;
  document.getElementById('xpLabel').textContent = 'Lv.' + lv;
  document.getElementById('xpNum').textContent = state.xp + ' XP';
  document.getElementById('xpBar').style.width = prog.pct + '%';
  document.getElementById('levelLabel').textContent = 'Lv.' + lv;
}

// ═══════════════════════════════════════
//  BADGES
// ═══════════════════════════════════════
function checkClearBadges() {
  const g1done = WORDS.filter(w=>w.g==='1').every(w=>w.word in sessionResults);
  const g2done = WORDS.filter(w=>w.g==='2').every(w=>w.word in sessionResults);
  const g3done = WORDS.filter(w=>w.g==='3').every(w=>w.word in sessionResults);
  if (g1done) state.grade1Cleared = true;
  if (g2done) state.grade2Cleared = true;
  if (g3done) state.grade3Cleared = true;
  if (g1done && g2done && g3done) state.allCleared = true;
}

function checkBadges() {
  BADGES.forEach(b => {
    if (!state.badges.includes(b.id) && b.check(state)) {
      state.badges.push(b.id);
      saveState();
      showBadgePopup(b);
    }
  });
}

function showBadgePopup(b) {
  document.getElementById('bpEmoji').textContent = b.emoji;
  document.getElementById('bpName').textContent  = b.name;
  const el = document.getElementById('badgePopup');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
//  LEVEL UP
// ═══════════════════════════════════════
const LEVEL_TITLES = ['','見習い','初級者','中級者','上級者','達人','エース','スーパースター','レジェンド','神','究極'];
function showLevelUp(lv) {
  document.getElementById('luLevel').textContent = 'Lv.' + lv;
  document.getElementById('luSub').textContent = LEVEL_TITLES[Math.min(lv, LEVEL_TITLES.length-1)] || 'マスター';
  const el = document.getElementById('levelUp');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
}

// ═══════════════════════════════════════
//  RESULT PANEL
// ═══════════════════════════════════════
function showResultPanel() {
  const total = deck.length;
  const ok    = Object.values(sessionResults).filter(v=>v).length;
  const ng    = total - ok;
  const pct   = Math.round(ok/total*100);
  const emoji = pct>=90?'🏆':pct>=70?'🌟':pct>=50?'😊':'💪';
  const msg   = pct>=90?'パーフェクト！':pct>=70?'よくできました！':pct>=50?'もう少し！':'まだまだこれから！';

  const html = `
    <div class="result-emoji">${emoji}</div>
    <div class="panel-title">${msg}</div>
    <div class="panel-sub">全 ${total} 問完了</div>
    <div class="result-score">${pct}%</div>
    <div class="result-detail">${ok} 問正解 / ${ng} 問不正解</div>
    <div class="result-grid">
      <div class="result-box"><div class="result-num ok">${ok}</div><div class="result-lbl">✓ 知ってた</div></div>
      <div class="result-box"><div class="result-num ng">${ng}</div><div class="result-lbl">✗ 知らなかった</div></div>
    </div>
    <button class="btn-panel" onclick="closeOverlay();shuffleDeck()">🔁 もう一度</button>
    <button class="btn-panel-outline" onclick="closeOverlay();openBadgePanel()">🏅 バッジを見る</button>
  `;
  document.getElementById('panelContent').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

// ═══════════════════════════════════════
//  BADGE PANEL
// ═══════════════════════════════════════
function openBadgePanel() {
  const earned = state.badges;
  const rows = BADGES.map(b => {
    const e = earned.includes(b.id);
    return `<div class="badge-item ${e?'earned':''}">
      <div class="badge-icon">${b.emoji}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
  const html = `
    <div class="panel-title">🏅 実績バッジ</div>
    <div class="panel-sub">${earned.length} / ${BADGES.length} 獲得</div>
    <div class="badge-grid">${rows}</div>
    <button class="btn-panel-outline" onclick="closeOverlay()">閉じる</button>
  `;
  document.getElementById('panelContent').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

// ═══════════════════════════════════════
//  MENU
// ═══════════════════════════════════════
function openMenu() { document.getElementById('menuPanel').classList.add('show'); }
function closeMenu() { document.getElementById('menuPanel').classList.remove('show'); }

function resetAllData() {
  if (!confirm('全データをリセットします。よろしいですか？')) return;
  localStorage.removeItem('chuugaku_state');
  state = defaultState();
  saveState();
  updateHeader();
  buildDeck();
  showToast('データをリセットしました');
}

// ═══════════════════════════════════════
//  TOUCH / SWIPE
// ═══════════════════════════════════════
let touchStartX = 0, touchStartY = 0, isDragging = false;
const cardWrap = document.getElementById('cardWrap');
const drag = document.getElementById('dragIndicator');

cardWrap.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = true;
}, {passive:true});

cardWrap.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
    document.getElementById('card').style.transform =
      `translateX(${dx*0.4}px) rotate(${dx*0.03}deg)` + (isFlipped?' rotateY(180deg)':'');
    if (Math.abs(dx) > 40) {
      drag.textContent = dx > 0 ? '✓' : '✗';
      drag.style.color = dx > 0 ? '#4ade80' : '#f87171';
      drag.style.opacity = Math.min(1, (Math.abs(dx)-40)/60);
    } else {
      drag.style.opacity = 0;
    }
  }
}, {passive:true});

cardWrap.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false;
  drag.style.opacity = 0;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  document.getElementById('card').style.transform = '';
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (!isFlipped) {
      // flip on any horizontal swipe if not flipped
      flipCard();
    } else {
      judge(dx > 0);
    }
  } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    flipCard();
  }
});

// Mouse click fallback
cardWrap.addEventListener('click', e => {
  if (!isDragging) flipCard();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' && isFlipped) judge(true);
  if (e.key === 'ArrowLeft'  && isFlipped) judge(false);
  if ((e.key==='o'||e.key==='O') && isFlipped) judge(true);
  if ((e.key==='x'||e.key==='X') && isFlipped) judge(false);
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
loadState();
updateStreak();
saveState();
updateHeader();
checkBadges();
buildDeck();
</script>
</body>
</html>
